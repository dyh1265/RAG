name: RAG Eval

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  retrieval-eval:
    name: Retrieval benchmarks
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/healthz && exit 0
            sleep 2
          done
          exit 1

      - name: Run retrieval eval
        env:
          QDRANT_URL: http://localhost:6333
          USE_TAXONOMY_VALIDATION: "false"
          USE_PII_REDACTION: "false"
        run: pytest tests/eval/test_retrieval.py tests/eval/test_metrics.py -m eval -v

  answer-eval:
    name: Answer quality (OpenAI)
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend + eval extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,eval]"

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/healthz && exit 0
            sleep 2
          done
          exit 1

      - name: Run answer-quality eval
        env:
          QDRANT_URL: http://localhost:6333
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_TAXONOMY_VALIDATION: "false"
          USE_PII_REDACTION: "false"
        run: pytest tests/eval/test_answer_quality.py -m eval -v -k "not ragas"
