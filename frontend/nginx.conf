server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve rag-api after container rebuilds (Docker embedded DNS).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend rag-api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Long PDFs on CPU can take many minutes to parse, OCR, embed, and
        # upsert. We need every nginx timeout that touches the request to be
        # raised; the default 60s on proxy_send_timeout and client_body_timeout
        # was producing 504s long before proxy_read_timeout ever got involved.
        proxy_connect_timeout 60s;
        proxy_send_timeout 1200s;
        proxy_read_timeout 1200s;
        client_body_timeout 1200s;
        send_timeout 1200s;

        # Stream the upload straight through to rag-api instead of buffering
        # the entire multipart body in nginx first. Materially lowers memory
        # use for large PDFs and lets rag-api start work earlier.
        proxy_request_buffering off;
        # SSE (/ingest/stream, /query/stream) must flush each event immediately.
        proxy_buffering off;
        client_max_body_size 100m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
