# Start the full stack:                       docker compose --profile production up -d
# Start just the vector + cache services:     docker compose up -d qdrant redis
# Start observability too:                    docker compose up -d prometheus grafana jaeger
# Run a Celery worker for bulk ingest:        docker compose --profile production up -d ingest-worker

services:

  # ---------------------------------------------------------------------------
  # Vector DB — primary store for all chunk embeddings.
  # UI: http://localhost:6333/dashboard
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — embedding cache + Celery task queue.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping. UI: http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rag_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards. UI: http://localhost:3000  (admin / admin)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: rag_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger — distributed tracing. UI: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: rag_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + rate limiting in front of the API.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: rag_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rag-api
      - documind-web
    profiles:
      - production
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI service (backend.api.main:app)
  # ---------------------------------------------------------------------------
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag_api
    ports:
      - "8002:8000"
    env_file:
      - ../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      OTLP_ENDPOINT: http://jaeger:4317
      USE_COLPALI: "false"
      USE_HYBRID: "true"
      USE_RECURSIVE_CHUNKER: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
      USE_TAXONOMY_VALIDATION: "true"
      USE_PII_REDACTION: "true"
      USE_PII_REDACTION_ON_INGEST: "true"
      API_WARMUP_MODELS: "true"
      USE_OCR: "true"
    volumes:
      - ../data:/app/data
      - ../backend:/app/backend
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    profiles:
      - production
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery bulk-ingest worker — reuses the same backend image as rag-api.
  # ---------------------------------------------------------------------------
  ingest-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rag-api-backend:latest
    container_name: rag_ingest_worker
    env_file:
      - ../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      EMBEDDING_DEVICE: cpu
      USE_COLPALI: "false"
      USE_HYBRID: "true"
      USE_RECURSIVE_CHUNKER: "true"
      USE_OCR: "true"
      INGEST_METRICS_PORT: "9100"
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    ports:
      - "9100:9100"
    volumes:
      - ../data:/app/data
      - ../backend:/app/backend
    command: ["celery", "-A", "backend.scaling.workers.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    profiles:
      - production
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend (React + Vite). Dev: http://localhost:5173 / Prod: http://localhost:5174
  # ---------------------------------------------------------------------------
  documind-web-dev:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: documind_web_dev
    ports:
      - "5173:5173"
    environment:
      DOCKER: "true"
      VITE_DEV_API_PROXY: http://rag-api:8000
    volumes:
      - ../frontend:/app
      - documind_node_modules:/app/node_modules
    depends_on:
      - rag-api
    profiles:
      - production
    restart: unless-stopped

  documind-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_RAG_API_URL: /api
    container_name: documind_web
    ports:
      - "5174:80"
    depends_on:
      - rag-api
    profiles:
      - production
    restart: unless-stopped


volumes:
  qdrant_data:
  redis_data:
  prometheus_data:
  grafana_data:
  huggingface_cache:
  documind_node_modules:
