# Start the full stack (UI on http://localhost):
#     docker compose --profile production up -d --build
# Frontend hot-reload (Vite on http://localhost:5173):
#     docker compose --profile dev up -d --build
# Just vector + cache (for `uvicorn` + `npm run dev` on the host):
#     docker compose up -d qdrant redis
# Observability stack:
#     docker compose up -d prometheus grafana jaeger

services:

  # ---------------------------------------------------------------------------
  # Vector DB — primary store for all chunk embeddings.
  # UI: http://localhost:6333/dashboard
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: rag_qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — embedding cache + Celery task queue.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping. UI: http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rag_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards. UI: http://localhost:3000  (admin / admin)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: rag_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger — distributed tracing. UI: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: rag_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI service (backend.api.main:app)
  # Bound to 127.0.0.1 so a public demo only exposes the web container on :80.
  # `documind-web`'s nginx proxies /api -> rag-api inside the compose network.
  # ---------------------------------------------------------------------------
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag_api
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - ../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      OTLP_ENDPOINT: http://jaeger:4317
      USE_COLPALI: "false"
      USE_HYBRID: "true"
      USE_RECURSIVE_CHUNKER: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
      USE_TAXONOMY_VALIDATION: "true"
      USE_PII_REDACTION: "true"
      USE_PII_REDACTION_ON_INGEST: "true"
      API_WARMUP_MODELS: "true"
      USE_OCR: "true"
    volumes:
      - ../data:/app/data
      - ../backend:/app/backend
      - ../scripts:/app/scripts
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    profiles:
      - production
      - dev
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery bulk-ingest worker — reuses the same backend image as rag-api.
  # ---------------------------------------------------------------------------
  ingest-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rag-api-backend:latest
    container_name: rag_ingest_worker
    env_file:
      - ../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      EMBEDDING_DEVICE: cpu
      USE_COLPALI: "false"
      USE_HYBRID: "true"
      USE_RECURSIVE_CHUNKER: "true"
      USE_OCR: "true"
      INGEST_METRICS_PORT: "9100"
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    ports:
      - "9100:9100"
    volumes:
      - ../data:/app/data
      - ../backend:/app/backend
      - ../scripts:/app/scripts
      - huggingface_cache:/root/.cache/huggingface
    command: ["celery", "-A", "backend.scaling.workers.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    profiles:
      - production
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — production demo build (React + nginx).
  # Single public surface: serves the SPA + proxies /api -> rag-api on :80.
  # Same layout works for `localhost` and `cloudflared tunnel --url http://localhost:80`.
  # ---------------------------------------------------------------------------
  documind-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_RAG_API_URL: /api
        VITE_DEMO_UI: "${VITE_DEMO_UI:-true}"
    container_name: documind_web
    ports:
      # DOCUMIND_WEB_PORT lets reverse proxies (Caddy, Traefik) reclaim :80;
      # default exposes 80 publicly for direct demos / Cloudflare Tunnel.
      - "${DOCUMIND_WEB_PORT:-80:80}"
    depends_on:
      - rag-api
    profiles:
      - production
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Vite dev server with hot reload. Use `--profile dev`.
  # ---------------------------------------------------------------------------
  documind-web-dev:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: documind_web_dev
    ports:
      - "5173:5173"
    environment:
      DOCKER: "true"
      VITE_DEV_API_PROXY: http://rag-api:8000
    volumes:
      - ../frontend:/app
      - documind_node_modules:/app/node_modules
    depends_on:
      - rag-api
    profiles:
      - dev
    restart: unless-stopped


volumes:
  qdrant_data:
  redis_data:
  prometheus_data:
  grafana_data:
  huggingface_cache:
  documind_node_modules:
