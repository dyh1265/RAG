# Public demo overlay — use with the production profile on a cloud VM.
#
#   cd docker
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml --profile production up -d --build
#
# Exposes DocuMind Web on port 80. Keeps Qdrant, Redis, and rag-api off the public interface.

services:
  qdrant:
    ports: !override
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"

  redis:
    ports: !override
      - "127.0.0.1:6379:6379"

  rag-api:
    ports: !override
      - "127.0.0.1:8002:8000"

  # documind-web serves React + /api proxy; rag_nginx also binds :80 in production.
  nginx:
    profiles: !override
      - never

  documind-web:
    ports: !override
      - "80:80"
    build:
      args:
        VITE_RAG_API_URL: /api
        VITE_DEMO_UI: "true"

  # Dev hot-reload UI — not needed on a public demo host.
  documind-web-dev:
    profiles: !override
      - never
