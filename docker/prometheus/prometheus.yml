global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rag_api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"

  - job_name: "rag_ingest_worker"
    static_configs:
      - targets: ["ingest-worker:9100"]
    metrics_path: "/metrics"
